<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>Text to PDF Converter</h1>
            <p class="subtitle">Convert unlimited text to PDF with one click</p>
        </header>
        
        <div class="content">
            <div class="input-section">
                <label for="textInput">Enter your text:</label>
                <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
            </div>
            
            <div class="options">
                <div class="option-group">
                    <label for="pageSize">Page Size:</label>
                    <select id="pageSize">
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label for="fontSize">Font Size:</label>
                    <select id="fontSize">
                        <option value="10">10</option>
                        <option value="12" selected>12</option>
                        <option value="14">14</option>
                        <option value="16">16</option>
                        <option value="18">18</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label for="fileName">File Name:</label>
                    <input type="text" id="fileName" placeholder="Enter file name" value="converted_document">
                </div>
            </div>
            
            <div class="button-group">
                <button id="convertBtn">Convert to PDF</button>
                <button id="downloadBtn">Download PDF</button>
                <button id="clearBtn">Clear Text</button>
            </div>
            
            <div id="statusMessage" class="status"></div>
        </div>
    </div>
    
    <footer>
        <p>Text to PDF Converter &copy; 2025 | Unlimited text conversion</p>
    </footer>
</body>
<script src="script.js"></script>
</html>
